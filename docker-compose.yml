services:
  nano-mirror:
    image: ghcr.io/openrai/nano-p2p-mirror:latest
    environment:
      AUTHORITY_PUBKEY: "${AUTHORITY_PUBKEY:?AUTHORITY_PUBKEY is required}"
      DATA_DIR: /data
      POLL_INTERVAL: "600"
      LOG_LEVEL: INFO
    volumes:
      - nano-data:/data
    ports:
      - "6881:6881/tcp"
      - "6881:6881/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import libtorrent; libtorrent.session({'enable_dht': False})"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nano-data: